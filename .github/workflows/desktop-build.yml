name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macOS-arm64
          - os: macos-13
            platform: macOS-x64
          - os: ubuntu-latest
            platform: Linux
          - os: windows-latest
            platform: Windows

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Install root deps (CLI source + tsup for desktop bundle)
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      # Install desktop package deps (electron, node-pty, forge)
      - name: Install desktop dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/desktop

      # Bundle CLI into self-contained dist-desktop/astra.js
      - name: Bundle CLI for desktop
        run: pnpm desktop:bundle

      # Compile desktop TypeScript + build renderer
      - name: Compile desktop
        run: pnpm compile
        working-directory: packages/desktop

      # Stage native modules (resolve pnpm symlinks for packager)
      - name: Stage native modules
        run: node scripts/stage-native-modules.mjs
        working-directory: packages/desktop

      # Build platform-specific installer
      - name: Make installer
        run: npx electron-forge make
        working-directory: packages/desktop

      # Upload artifacts (available from Actions tab)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Astra-${{ matrix.platform }}
          path: packages/desktop/out/make/**/*

      # Collect installer files for release upload
      - name: Collect release files
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "$RUNNER_OS" == "macOS" ]; then
            cp packages/desktop/out/make/**/*.dmg release-assets/Astra-${{ matrix.platform }}.dmg 2>/dev/null || true
          elif [ "$RUNNER_OS" == "Linux" ]; then
            cp packages/desktop/out/make/deb/x64/*.deb release-assets/ 2>/dev/null || true
            cp packages/desktop/out/make/rpm/x64/*.rpm release-assets/ 2>/dev/null || true
          elif [ "$RUNNER_OS" == "Windows" ]; then
            cp packages/desktop/out/make/squirrel.windows/x64/*.exe release-assets/ 2>/dev/null || true
          fi
          ls -la release-assets/

      # Upload release files as artifact for the release job
      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release-assets/*

  # Create GitHub Release with all platform installers attached
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')

    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: assets

      - name: List assets
        run: ls -la assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Astra Desktop ${{ github.ref_name }}"
          body: |
            ## Download

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS (Apple Silicon) | `Astra-macOS-arm64.dmg` | M1/M2/M3/M4 |
            | macOS (Intel) | `Astra-macOS-x64.dmg` | Older Macs |
            | Linux (Debian/Ubuntu) | `.deb` | `sudo dpkg -i <file>.deb` |
            | Linux (Fedora/RHEL) | `.rpm` | `sudo rpm -i <file>.rpm` |
            | Windows | `.exe` | Squirrel installer |

            ### macOS — first launch

            The app is not code-signed. After downloading, run once:
            ```bash
            xattr -cr /Applications/Astra.app
            ```

            ### CLI (terminal only)

            ```bash
            npx @astranova-live/cli
            ```
          files: assets/*
          draft: false
          prerelease: false
