name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macOS-arm64
          - os: ubuntu-latest
            platform: Linux
          - os: windows-latest
            platform: Windows

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/tauri/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sidecar
        run: pnpm sidecar:build
        working-directory: packages/tauri

      - name: Download Node.js binary
        run: node scripts/download-node.mjs
        working-directory: packages/tauri

      - name: Verify bundled resources
        shell: bash
        run: |
          echo "=== node-bin/ ==="
          ls -la packages/tauri/node-bin/
          echo "=== sidecar-dist/ ==="
          ls -la packages/tauri/sidecar-dist/

      - name: Build Tauri app
        run: pnpm tauri build
        working-directory: packages/tauri

      # Upload artifacts (available from Actions tab)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Astra-${{ matrix.platform }}
          path: |
            packages/tauri/src-tauri/target/release/bundle/**/*.dmg
            packages/tauri/src-tauri/target/release/bundle/**/*.deb
            packages/tauri/src-tauri/target/release/bundle/**/*.AppImage
            packages/tauri/src-tauri/target/release/bundle/**/*.msi

      # Collect installer files for release upload
      - name: Collect release files
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "$RUNNER_OS" == "macOS" ]; then
            find packages/tauri/src-tauri/target/release/bundle -name '*.dmg' -exec cp {} release-assets/Astra-${{ matrix.platform }}.dmg \; 2>/dev/null || true
          elif [ "$RUNNER_OS" == "Linux" ]; then
            find packages/tauri/src-tauri/target/release/bundle -name '*.deb' -exec cp {} release-assets/ \; 2>/dev/null || true
            find packages/tauri/src-tauri/target/release/bundle -name '*.AppImage' -exec cp {} release-assets/ \; 2>/dev/null || true
          elif [ "$RUNNER_OS" == "Windows" ]; then
            find packages/tauri/src-tauri/target/release/bundle -name '*.msi' -exec cp {} release-assets/ \; 2>/dev/null || true
          fi
          ls -la release-assets/

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release-assets/*

  # Create GitHub Release with all platform installers attached
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')

    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: assets

      - name: List assets
        run: ls -la assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Astra Desktop ${{ github.ref_name }}"
          body: |
            ## Download

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS (Apple Silicon) | `Astra-macOS-arm64.dmg` | M1/M2/M3/M4 |
            | Linux (Debian/Ubuntu) | `.deb` | `sudo dpkg -i <file>.deb` |
            | Linux (AppImage) | `.AppImage` | `chmod +x <file>.AppImage && ./<file>.AppImage` |
            | Windows | `.msi` | Standard installer |

            ### macOS — first launch

            The app is not code-signed. After downloading, run once:
            ```bash
            xattr -cr /Applications/Astra.app
            ```

            ### CLI (terminal only)

            ```bash
            npx @astra-cli/cli
            ```
          files: assets/*
          draft: false
          prerelease: false
